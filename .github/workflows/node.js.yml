# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    paths-ignore:
      # ignore paths and markdown files
      - ".github/workflows/**"
      - "**/*.md"
    branches: [ "main" ]
  pull_request:
    paths-ignore:
        # ignore paths and markdown files
        - ".github/workflows/**"
        - "**/*.md"
    branches: [ "main" ]
  workflow_dispatch:

env: 
  ARTIFACT_CREATED: ${{ false }}

jobs:
  build:
    # runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [20.x, 22.x, 24.x]
    runs-on: ${{ matrix.os }}
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
    steps:
    - uses: actions/checkout@v6
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    # https://github.com/actions/upload-artifact
    # Check to see if artifact has already been created
    # Upload only node 24.x version
    - name: Upload build artifact
      uses: actions/upload-artifact@v6
      with: 
        name: my-artifact-${{ matrix.node-version }}-${{ matrix.os }}
        path: public
    - name: Upload pages artifact
      if: ${{matrix.node-version == '24.x'}}
      uses: actions/upload-pages-artifact@v3
      with: 
        path: ./public
      

    
    
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: download webpack artifact
      uses: actions/download-artifact@v8
      with:
        name: my-artifact-24.x-ubuntu-latest
        path: public
    - name: build and test
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: 'npm'
    - run: npm ci
    - run: npm test -- -u

  deploy:
    name: Deploy to GitHub pages
    needs: [test]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub pages
        id: deployment
        uses: actions/deploy-pages@v4
        #with: 
          #artifact_name: my-artifact-22.x-ubuntu-latest
